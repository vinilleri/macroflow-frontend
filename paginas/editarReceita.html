
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Receita</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <h2>Editar Receita</h2>
    <form onsubmit="editarReceita(event)">
        <input type="text" id="nome" placeholder="Nome da receita" required>
        <button type="submit">Salvar</button>
    </form>

    <h3>Itens da Receita</h3>
    <table id="tabelaItens"></table>

    <h3>Adicionar Item</h3>
    <form onsubmit="adicionarItem(event)">
        <label>Comida:</label>
        <select id="comida"></select>
        <input type="number" step="0.01" id="quantidade" placeholder="Quantidade" required>
        <label>Unidade:</label>
        <select id="unidade"></select>
        <input type="number" step="0.01" id="valor" placeholder="Valor" required>
        <button type="submit">Adicionar Item</button>
    </form>

    <a href="receitas.html">Voltar</a>
    <script src="../script/api.js"></script>
    <script src="../script/receitaItem.js"></script>
    <script src="../script/receita.js"></script>
</body>
</html>
