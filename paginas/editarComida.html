<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Comida</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <h2>Editar Comida</h2>
    <form onsubmit="editarComida(event)">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="number" step="0.01" id="calorias" placeholder="Calorias" required>
        <input type="number" step="0.01" id="proteinas" placeholder="Proteínas" required>
        <input type="number" step="0.01" id="carboidrato" placeholder="Carboidrato" required>
        <input type="number" step="0.01" id="gordura" placeholder="Gordura" required>
        <label>Ícone:</label>
        <select id="icone"></select>
        <input type="number" step="0.01" id="valor" placeholder="Valor padrão" required>
        <label>Unidade:</label>
        <select id="unidade"></select>
        <button type="submit">Salvar</button>
    </form>
    <a href="comidas.html">Voltar</a>
    <script src="../script/api.js"></script>
    <script src="../script/comida.js"></script>
      <script>
        document.addEventListener("DOMContentLoaded", carregarComida());
    </script>
</body>
</html>
