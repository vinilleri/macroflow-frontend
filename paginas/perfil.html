<head>

    <title>Perfil</title>

</head>
<body>
    <div class="card">
    <h2>Perfil</h2>
    <form onsubmit="editarUsuario(event)">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="senha" placeholder="Nova Senha (deixe em branco para não alterar)">
        <label>Nível de Atividade Física:</label>
        <select id="atividadeFisica"></select>
        <button type="submit">Salvar</button>
    </form>
   
    <button onclick="atualizarAtividadeFisica()">Atualizar só Atividade Física</button>
    <button onclick="deletarUsuario()">Excluir Conta</button>
    <button onclick = "logout()"> Deslogar da Conta</button>
    
   
    <a href="medidasCorporais.html">Medidas Corporais</a> |

      </div>
         </div>

</body>
</html>
